<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aula Digital · Mockup (para dazzle)</title>
<!--
  ============================================================================
  MOCKUP / CÁSCARA para mostrarle a dazzle la experiencia deseada.
  Todo es SIMULADO (sin backend, sin NFC real). Dos vistas:
    1) LOGIN  (NFC o usuario/contraseña).  Atajo demo: tecla "0" inicia sesión.
    2) HOME   estilo Google Drive (carpetas y archivos simulados).
  La UI vive dentro de una VENTANA MOBILE ARRASTRABLE (drag con mouse o dedo),
  no a pantalla completa, para ilustrar el modo ventana.
  ============================================================================
-->
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root{
    --brand:#4f46e5; --brand2:#7c3aed; --ok:#22c55e;
    --ink:#1e293b; --muted:#64748b; --line:#e2e8f0; --bg:#f8fafc;
  }
  html,body{height:100%;}
  body{
    font-family: system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    /* fondo tipo escritorio para que se note que es una "ventana" */
    background:
      radial-gradient(1200px 600px at 80% -10%, #c7d2fe55, transparent),
      radial-gradient(1000px 500px at -10% 110%, #ddd6fe66, transparent),
      linear-gradient(135deg,#0f172a,#1e293b);
    min-height:100%; overflow:hidden;
  }

  /* ===== Ventana arrastrable ===== */
  .window{
    position:absolute; top:60px; left:60px;
    width:380px; border-radius:20px; overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.55);
    background:#000; user-select:none;
  }
  .titlebar{
    height:38px; background:#0b1220; display:flex; align-items:center;
    gap:8px; padding:0 12px; cursor:grab; color:#94a3b8; font-size:13px;
  }
  .titlebar.dragging{ cursor:grabbing; }
  .dot{ width:12px;height:12px;border-radius:50%; }
  .dot.r{background:#ff5f57} .dot.y{background:#febc2e} .dot.g{background:#28c840}
  .titlebar .ttl{ margin-left:8px; font-weight:600; color:#cbd5e1; }

  /* ===== Pantalla "celular" ===== */
  .screen{
    position:relative; width:380px; height:720px; background:var(--bg);
    overflow:hidden;
  }
  .statusbar{
    height:30px; display:flex; align-items:center; justify-content:space-between;
    padding:0 16px; font-size:12px; color:var(--muted); background:transparent;
  }

  .view{ position:absolute; inset:30px 0 0 0; display:flex; flex-direction:column; }
  .hidden{ display:none !important; }

  /* ===== LOGIN ===== */
  .login{ background:linear-gradient(160deg,var(--brand),var(--brand2)); color:#fff;
          padding:28px 26px; height:100%; }
  .logo{ width:72px;height:72px;border-radius:20px;background:#ffffff22;
         display:flex;align-items:center;justify-content:center;font-size:38px;
         margin:14px auto 14px; backdrop-filter: blur(4px); }
  .login h1{ text-align:center; font-size:24px; }
  .login p.sub{ text-align:center; opacity:.85; margin-top:6px; font-size:14px; }

  .tabs{ display:flex; background:#ffffff22; border-radius:12px; padding:4px; margin:24px 0 18px; }
  .tab{ flex:1; text-align:center; padding:10px; border-radius:9px; font-size:14px;
        cursor:pointer; color:#fff; opacity:.8; }
  .tab.active{ background:#fff; color:var(--brand); opacity:1; font-weight:600; }

  .pane{ display:none; } .pane.active{ display:block; }

  .nfc-anim{ display:flex;flex-direction:column;align-items:center; margin-top:18px; }
  .ring{ width:120px;height:120px;border-radius:50%; position:relative;
         display:flex;align-items:center;justify-content:center; }
  .ring::before,.ring::after{ content:""; position:absolute; inset:0; border-radius:50%;
        border:3px solid #ffffff88; animation:pulse 1.8s ease-out infinite; }
  .ring::after{ animation-delay:.9s; }
  @keyframes pulse{ 0%{transform:scale(.6);opacity:.9} 100%{transform:scale(1.25);opacity:0} }
  .ring .ic{ font-size:46px; }
  .nfc-anim .txt{ margin-top:18px; text-align:center; font-size:15px; }
  .nfc-anim .hint{ margin-top:8px; font-size:12px; opacity:.8;
        background:#00000022; padding:6px 10px; border-radius:20px; }

  .field{ margin-bottom:12px; }
  .field label{ font-size:12px; opacity:.85; display:block; margin-bottom:6px; }
  .field input{ width:100%; padding:13px 14px; border-radius:11px; border:none;
        font-size:15px; color:var(--ink); }
  .btn{ width:100%; padding:14px; border:none; border-radius:12px; font-size:16px;
        font-weight:700; cursor:pointer; margin-top:6px;
        background:#fff; color:var(--brand); }
  .btn:active{ transform:scale(.99); }
  .btn.ghost{ background:#ffffff22; color:#fff; margin-top:10px; }

  /* ===== HOME (estilo Drive) ===== */
  .home{ background:#fff; height:100%; }
  .topbar{ display:flex; align-items:center; gap:12px; padding:16px 18px;
           border-bottom:1px solid var(--line); }
  .avatar{ width:40px;height:40px;border-radius:50%;
        background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff;
        display:flex;align-items:center;justify-content:center;font-weight:700; }
  .topbar .who{ flex:1; }
  .topbar .who .hi{ font-size:12px; color:var(--muted); }
  .topbar .who .nm{ font-size:16px; font-weight:700; color:var(--ink); }
  .iconbtn{ width:38px;height:38px;border-radius:10px;border:none;background:#f1f5f9;
        cursor:pointer; font-size:16px; }

  .search{ margin:14px 16px; background:#f1f5f9; border-radius:24px; padding:11px 16px;
        color:var(--muted); font-size:14px; display:flex; gap:8px; align-items:center; }

  .crumbs{ padding:4px 18px; font-size:13px; color:var(--muted); }
  .crumbs b{ color:var(--ink); }

  .list{ overflow:auto; padding:6px 10px 90px; }
  .row{ display:flex; align-items:center; gap:14px; padding:12px 12px; border-radius:12px;
        cursor:pointer; }
  .row:hover{ background:#f8fafc; }
  .ficon{ width:42px;height:42px;border-radius:10px; display:flex;align-items:center;
        justify-content:center; font-size:20px; color:#fff; flex:none; }
  .f-folder{ background:#fbbf24; } .f-ppt{ background:#ea580c; } .f-pdf{ background:#dc2626; }
  .f-xls{ background:#16a34a; } .f-doc{ background:#2563eb; } .f-vid{ background:#7c3aed; }
  .meta{ flex:1; min-width:0; }
  .meta .nm{ font-size:15px; color:var(--ink); white-space:nowrap; overflow:hidden;
        text-overflow:ellipsis; }
  .meta .sub{ font-size:12px; color:var(--muted); margin-top:2px; }
  .more{ color:#cbd5e1; font-size:18px; }

  .fab{ position:absolute; right:20px; bottom:22px; width:58px;height:58px;border-radius:18px;
        background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff;
        border:none; font-size:28px; cursor:pointer; box-shadow:0 10px 24px #4f46e588; }

  /* toast */
  .toast{ position:absolute; left:50%; bottom:96px; transform:translateX(-50%) translateY(20px);
        background:#0f172a; color:#fff; padding:10px 16px; border-radius:24px; font-size:13px;
        opacity:0; pointer-events:none; transition:.25s; white-space:nowrap; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .help{ position:fixed; left:0; right:0; bottom:14px; text-align:center; color:#cbd5e1;
        font-size:13px; }
  .help kbd{ background:#fff; color:#0f172a; border-radius:6px; padding:1px 7px;
        font-weight:700; }
</style>
</head>
<body>

  <div class="window" id="win">
    <!-- barra de ventana (arrastrable) -->
    <div class="titlebar" id="drag">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="ttl">Aula Digital</span>
    </div>

    <div class="screen">
      <div class="statusbar"><span>9:41</span><span>📶 🔋 100%</span></div>

      <!-- ===================== VISTA 1: LOGIN ===================== -->
      <div class="view login" id="viewLogin">
        <div class="logo">🎓</div>
        <h1>Aula Digital</h1>
        <p class="sub">Ingresá con tu tarjeta o tu cuenta</p>

        <div class="tabs">
          <div class="tab active" data-tab="nfc">📇 NFC</div>
          <div class="tab" data-tab="pass">🔑 Usuario</div>
        </div>

        <!-- pane NFC -->
        <div class="pane active" id="paneNfc">
          <div class="nfc-anim">
            <div class="ring"><span class="ic">📡</span></div>
            <div class="txt">Acercá tu tarjeta para entrar</div>
            <div class="hint">Demo: presioná la tecla <b>0</b></div>
          </div>
        </div>

        <!-- pane usuario/contraseña -->
        <div class="pane" id="panePass">
          <div class="field">
            <label>Usuario</label>
            <input type="text" id="user" placeholder="manuel" autocomplete="off" />
          </div>
          <div class="field">
            <label>Contraseña</label>
            <input type="password" id="pass" placeholder="••••••••" />
          </div>
          <button class="btn" id="btnLogin">Entrar</button>
        </div>
      </div>

      <!-- ===================== VISTA 2: HOME (Drive) ===================== -->
      <div class="view home hidden" id="viewHome">
        <div class="topbar">
          <div class="avatar" id="avatar">M</div>
          <div class="who">
            <div class="hi">Bienvenido,</div>
            <div class="nm" id="welcomeName">Manuel</div>
          </div>
          <button class="iconbtn" id="btnLogout" title="Cerrar sesión">⏻</button>
        </div>

        <div class="search">🔎 Buscar en mis archivos</div>
        <div class="crumbs">📁 <b>Mi unidad</b> · Matemática 5°</div>

        <div class="list" id="list">
          <!-- se llena por JS -->
        </div>

        <button class="fab" id="fab">＋</button>
        <div class="toast" id="toast"></div>
      </div>

    </div>
  </div>

  <div class="help">Arrastrá la ventana desde la barra superior · <kbd>0</kbd> inicia sesión</div>

<script>
  "use strict";
  const $ = (s)=>document.querySelector(s);

  // ---------- Datos simulados (estilo Google Drive) ----------
  const FILES = [
    { t:"folder", name:"Clase 1",                  sub:"12 elementos",  ic:"📁", cls:"f-folder" },
    { t:"folder", name:"Clase 2",                  sub:"8 elementos",   ic:"📁", cls:"f-folder" },
    { t:"ppt",    name:"puntos-notables.pptx",     sub:"PowerPoint · 4.2 MB", ic:"📊", cls:"f-ppt" },
    { t:"pdf",    name:"rectas-notables.pdf",      sub:"PDF · 1.1 MB",  ic:"📕", cls:"f-pdf" },
    { t:"xls",    name:"notas-alumnos.xlsx",       sub:"Hoja de cálculo · 320 KB", ic:"📗", cls:"f-xls" },
    { t:"doc",    name:"guia-ejercicios.docx",     sub:"Documento · 540 KB", ic:"📘", cls:"f-doc" },
    { t:"pdf",    name:"examen-parcial.pdf",       sub:"PDF · 880 KB",  ic:"📕", cls:"f-pdf" },
    { t:"vid",    name:"clase-funciones.mp4",      sub:"Video · 86 MB", ic:"🎬", cls:"f-vid" },
  ];

  function renderList(){
    const el = $("#list");
    el.innerHTML = FILES.map(f=>`
      <div class="row" data-name="${f.name}">
        <div class="ficon ${f.cls}">${f.ic}</div>
        <div class="meta">
          <div class="nm">${f.name}</div>
          <div class="sub">${f.sub}</div>
        </div>
        <div class="more">⋮</div>
      </div>`).join("");
    el.querySelectorAll(".row").forEach(r=>{
      r.addEventListener("click", ()=> toast("Abriendo “"+r.dataset.name+"”…"));
    });
  }

  let toastTimer=null;
  function toast(msg){
    const t=$("#toast"); t.textContent=msg; t.classList.add("show");
    clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),1600);
  }

  // ---------- Navegación login <-> home ----------
  function login(name){
    name = (name && name.trim()) ? name.trim() : "Manuel";
    name = name.charAt(0).toUpperCase()+name.slice(1);
    $("#welcomeName").textContent = name;
    $("#avatar").textContent = name.charAt(0).toUpperCase();
    $("#viewLogin").classList.add("hidden");
    $("#viewHome").classList.remove("hidden");
  }
  function logout(){
    $("#viewHome").classList.add("hidden");
    $("#viewLogin").classList.remove("hidden");
    $("#user").value=""; $("#pass").value="";
  }

  // tabs
  document.querySelectorAll(".tab").forEach(tab=>{
    tab.addEventListener("click", ()=>{
      document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
      tab.classList.add("active");
      const which = tab.dataset.tab;
      $("#paneNfc").classList.toggle("active", which==="nfc");
      $("#panePass").classList.toggle("active", which==="pass");
    });
  });

  $("#btnLogin").addEventListener("click", ()=> login($("#user").value || "Manuel"));
  $("#btnLogout").addEventListener("click", logout);
  $("#fab").addEventListener("click", ()=> toast("Subir archivo (demo)"));

  // Atajo demo: tecla "0" inicia sesión (simula el tap NFC)
  document.addEventListener("keydown", (e)=>{
    if (e.key === "0" && $("#viewLogin").classList.contains("hidden")===false){
      login("Manuel");
    }
  });

  // ---------- Ventana arrastrable (mouse + touch) ----------
  (function(){
    const win=$("#win"), handle=$("#drag");
    let down=false, ox=0, oy=0;
    function start(x,y){
      down=true; handle.classList.add("dragging");
      const r=win.getBoundingClientRect(); ox=x-r.left; oy=y-r.top;
    }
    function move(x,y){
      if(!down) return;
      let nx=x-ox, ny=y-oy;
      nx=Math.max(0, Math.min(window.innerWidth - win.offsetWidth,  nx));
      ny=Math.max(0, Math.min(window.innerHeight- win.offsetHeight, ny));
      win.style.left=nx+"px"; win.style.top=ny+"px";
    }
    function end(){ down=false; handle.classList.remove("dragging"); }

    handle.addEventListener("mousedown", e=>{ start(e.clientX,e.clientY); });
    window.addEventListener("mousemove", e=>move(e.clientX,e.clientY));
    window.addEventListener("mouseup", end);
    handle.addEventListener("touchstart", e=>{ const t=e.touches[0]; start(t.clientX,t.clientY); }, {passive:true});
    window.addEventListener("touchmove", e=>{ const t=e.touches[0]; move(t.clientX,t.clientY); }, {passive:true});
    window.addEventListener("touchend", end);
  })();

  renderList();
</script>
</body>
</html>
