<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aula Digital</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --brand:#4f46e5; --brand-2:#6d28d9; --brand-ink:#3730a3;
    --ink:#0f172a; --muted:#64748b; --line:#e9edf3; --bg:#f6f7fb; --card:#ffffff;
  }
  html,body{height:100%;}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,sans-serif;
    color:var(--ink); background:var(--bg);
    height:100vh; overflow:hidden;
  }
  .hidden{display:none !important;}
  .app{height:100vh;display:flex;flex-direction:column;}

  /* ======================= LOGIN ======================= */
  .login{
    height:100vh; display:flex; align-items:center; justify-content:center;
    padding:24px;
    background:
      radial-gradient(900px 500px at 100% 0%, #eef2ff, transparent),
      radial-gradient(800px 500px at 0% 100%, #f5f3ff, transparent),
      var(--bg);
  }
  .login-card{
    width:100%; max-width:420px; background:var(--card); border-radius:22px;
    box-shadow:0 20px 60px rgba(15,23,42,.10); padding:34px 32px;
    border:1px solid var(--line);
  }
  .brand{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:22px;}
  .brand .mark{
    width:64px;height:64px;border-radius:18px;
    background:linear-gradient(135deg,var(--brand),var(--brand-2));
    display:flex;align-items:center;justify-content:center;margin-bottom:14px;
    box-shadow:0 10px 24px rgba(79,70,229,.35);
  }
  .brand h1{font-size:22px;font-weight:700;letter-spacing:.2px;}
  .brand p{font-size:14px;color:var(--muted);margin-top:4px;}
  .ver-in{margin-top:10px;font-size:12px;color:#94a3b8;background:#f1f3f9;
          padding:3px 10px;border-radius:20px;}

  .tabs{display:flex;background:#f1f3f9;border-radius:12px;padding:5px;margin-bottom:22px;}
  .tab{flex:1;text-align:center;padding:10px;border-radius:9px;font-size:14px;font-weight:600;
       color:var(--muted);cursor:pointer;transition:.15s;}
  .tab.active{background:#fff;color:var(--brand);box-shadow:0 2px 8px rgba(15,23,42,.08);}

  .pane{display:none;} .pane.active{display:block;}

  /* NFC */
  .reader{display:flex;flex-direction:column;align-items:center;padding:6px 0 4px;cursor:pointer;}
  .reader .ring{position:relative;width:128px;height:128px;display:flex;align-items:center;justify-content:center;}
  .reader .ring::before,.reader .ring::after{
    content:"";position:absolute;inset:14px;border-radius:50%;
    border:2px solid var(--brand);opacity:0;animation:pulse 2s ease-out infinite;}
  .reader .ring::after{animation-delay:1s;}
  @keyframes pulse{0%{transform:scale(.7);opacity:.55}100%{transform:scale(1.25);opacity:0}}
  .reader .disc{
    width:92px;height:92px;border-radius:50%;
    background:linear-gradient(135deg,#eef2ff,#ede9fe);
    display:flex;align-items:center;justify-content:center;}
  .reader .label{margin-top:18px;font-size:15px;font-weight:600;}
  .reader .hint{margin-top:5px;font-size:13px;color:var(--muted);}

  /* form */
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:7px;font-weight:600;}
  .field input{width:100%;padding:14px 15px;border:1.5px solid var(--line);border-radius:12px;
      font-size:15px;color:var(--ink);background:#fbfcfe;transition:.15s;}
  .field input:focus{outline:none;border-color:var(--brand);background:#fff;}
  .btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:700;
      cursor:pointer;color:#fff;background:linear-gradient(135deg,var(--brand),var(--brand-2));
      box-shadow:0 8px 20px rgba(79,70,229,.30);transition:.12s;}
  .btn:active{transform:translateY(1px);}

  /* ======================= HOME ======================= */
  .appbar{display:flex;align-items:center;gap:14px;padding:16px 22px;background:#fff;
      border-bottom:1px solid var(--line);}
  .avatar{width:44px;height:44px;border-radius:50%;flex:none;color:#fff;font-weight:700;font-size:17px;
      background:linear-gradient(135deg,var(--brand),var(--brand-2));
      display:flex;align-items:center;justify-content:center;}
  .appbar .who{flex:1;min-width:0;}
  .appbar .who .hi{font-size:12px;color:var(--muted);}
  .appbar .who .nm{font-size:17px;font-weight:700;}
  .icon-btn{width:42px;height:42px;border-radius:11px;border:1px solid var(--line);background:#fff;
      cursor:pointer;font-size:17px;color:var(--muted);}
  .icon-btn:hover{background:#f8fafc;}

  .toolbar{padding:16px 22px 6px;background:#fff;}
  .search{display:flex;align-items:center;gap:10px;background:#f1f3f9;border-radius:14px;
      padding:12px 16px;color:var(--muted);font-size:14px;}

  .crumbs{padding:14px 24px 8px;font-size:13px;color:var(--muted);}
  .crumbs b{color:var(--ink);}

  .list{flex:1;overflow:auto;padding:2px 14px 24px;background:var(--bg);}
  .row{display:flex;align-items:center;gap:14px;padding:13px 12px;border-radius:14px;cursor:pointer;transition:.12s;}
  .row:hover{background:#fff;box-shadow:0 4px 14px rgba(15,23,42,.05);}
  .tile{width:46px;height:46px;border-radius:12px;flex:none;display:flex;align-items:center;justify-content:center;
      color:#fff;font-weight:700;font-size:12px;letter-spacing:.4px;}
  .t-folder{background:linear-gradient(135deg,#fbbf24,#f59e0b);font-size:20px;}
  .t-pdf{background:linear-gradient(135deg,#ef4444,#dc2626);}
  .t-ppt{background:linear-gradient(135deg,#fb923c,#ea580c);}
  .t-xls{background:linear-gradient(135deg,#34d399,#059669);}
  .t-doc{background:linear-gradient(135deg,#60a5fa,#2563eb);}
  .t-vid{background:linear-gradient(135deg,#a78bfa,#7c3aed);font-size:18px;}
  .row .meta{flex:1;min-width:0;}
  .row .meta .nm{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row .meta .sub{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .row .more{color:#cbd5e1;font-size:18px;padding:0 6px;}

  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(16px);
      background:#0f172a;color:#fff;padding:11px 18px;border-radius:30px;font-size:13.5px;
      opacity:0;pointer-events:none;transition:.25s;box-shadow:0 10px 30px rgba(0,0,0,.25);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .ver{position:fixed;right:12px;bottom:10px;font-size:11px;color:#cbd5e1;letter-spacing:.3px;}
  .dbg{display:none;position:fixed;top:0;left:0;right:0;background:#0f172a;color:#7dd3fc;
       font-family:ui-monospace,Menlo,monospace;font-size:11px;padding:6px 10px;
       word-break:break-all;z-index:9999;border-bottom:1px solid #334155;}
</style>
</head>
<body>

<div class="app">

  <!-- ===================== VISTA 1: LOGIN ===================== -->
  <section class="login" id="viewLogin">
    <div class="login-card">
      <div class="brand">
        <div class="mark">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none">
            <path d="M12 3 2 8l10 5 8-4v6" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M6 11v4c0 1.5 2.7 3 6 3s6-1.5 6-3v-4" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1>Aula Digital</h1>
        <p>Accedé a tu espacio de trabajo</p>
        <div class="ver-in">versión 1.4</div>
      </div>

      <div class="tabs">
        <div class="tab active" data-tab="nfc">Credencial NFC</div>
        <div class="tab" data-tab="pass">Usuario</div>
      </div>

      <!-- NFC -->
      <div class="pane active" id="paneNfc">
        <div class="reader" id="reader">
          <div class="ring">
            <div class="disc">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
                <path d="M5 8a13 13 0 0 1 0 8M9 6a18 18 0 0 1 0 12M13 4.5a23 23 0 0 1 0 15"
                      stroke="#4f46e5" stroke-width="1.8" stroke-linecap="round"/>
                <circle cx="17.5" cy="12" r="1.6" fill="#4f46e5"/>
              </svg>
            </div>
          </div>
          <div class="label">Acercá tu credencial</div>
          <div class="hint">Esperando tarjeta…</div>
        </div>
      </div>

      <!-- Usuario / contraseña -->
      <div class="pane" id="panePass">
        <div class="field">
          <label>Usuario</label>
          <input type="text" id="user" placeholder="usuario" autocomplete="off" />
        </div>
        <div class="field">
          <label>Contraseña</label>
          <input type="password" id="pass" placeholder="••••••••" />
        </div>
        <button class="btn" id="btnLogin">Ingresar</button>
      </div>
    </div>
  </section>

  <!-- ===================== VISTA 2: HOME ===================== -->
  <section class="app hidden" id="viewHome">
    <header class="appbar">
      <div class="avatar" id="avatar">M</div>
      <div class="who">
        <div class="hi">Bienvenido,</div>
        <div class="nm" id="welcomeName">Manuel</div>
      </div>
      <button class="icon-btn" id="btnLogout" title="Cerrar sesión">⏻</button>
    </header>

    <div class="toolbar">
      <div class="search">🔎 Buscar en mis archivos</div>
    </div>
    <div class="crumbs">Mi unidad · <b>Matemática 5°</b></div>

    <div class="list" id="list"></div>
  </section>

</div>

<div class="toast" id="toast"></div>
<div class="ver">v1.4</div>
<div class="dbg" id="dbg"></div>

<script>
  "use strict";
  const $ = (s)=>document.querySelector(s);

  const FILES = [
    {t:"folder",name:"Clase 1",            sub:"12 elementos",        tag:"",    cls:"t-folder", ic:"📁"},
    {t:"folder",name:"Clase 2",            sub:"8 elementos",         tag:"",    cls:"t-folder", ic:"📁"},
    {t:"file",  name:"puntos-notables.pptx",sub:"Presentación · 4.2 MB", tag:"PPT", cls:"t-ppt"},
    {t:"file",  name:"rectas-notables.pdf", sub:"PDF · 1.1 MB",        tag:"PDF", cls:"t-pdf"},
    {t:"file",  name:"notas-alumnos.xlsx",  sub:"Hoja de cálculo · 320 KB", tag:"XLS", cls:"t-xls"},
    {t:"file",  name:"guía-ejercicios.docx",sub:"Documento · 540 KB",  tag:"DOC", cls:"t-doc"},
    {t:"file",  name:"examen-parcial.pdf",  sub:"PDF · 880 KB",        tag:"PDF", cls:"t-pdf"},
    {t:"file",  name:"clase-funciones.mp4", sub:"Video · 86 MB",       tag:"",    cls:"t-vid", ic:"▶"},
  ];

  function renderList(){
    $("#list").innerHTML = FILES.map(f=>`
      <div class="row" data-name="${f.name}">
        <div class="tile ${f.cls}">${f.ic ? f.ic : f.tag}</div>
        <div class="meta">
          <div class="nm">${f.name}</div>
          <div class="sub">${f.sub}</div>
        </div>
        <div class="more">⋮</div>
      </div>`).join("");
    document.querySelectorAll(".row").forEach(r=>{
      r.addEventListener("click", ()=> toast("Abriendo “"+r.dataset.name+"”"));
    });
  }

  let toastTimer=null;
  function toast(msg){
    const t=$("#toast"); t.textContent=msg; t.classList.add("show");
    clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),1500);
  }

  function login(name){
    name=(name&&name.trim())?name.trim():"Manuel";
    name=name.charAt(0).toUpperCase()+name.slice(1);
    $("#welcomeName").textContent=name;
    $("#avatar").textContent=name.charAt(0).toUpperCase();
    $("#viewLogin").classList.add("hidden");
    $("#viewHome").classList.remove("hidden");
  }
  function logout(){
    $("#viewHome").classList.add("hidden");
    $("#viewLogin").classList.remove("hidden");
    $("#user").value=""; $("#pass").value="";
  }

  document.querySelectorAll(".tab").forEach(tab=>{
    tab.addEventListener("click", ()=>{
      document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
      tab.classList.add("active");
      const w=tab.dataset.tab;
      $("#paneNfc").classList.toggle("active", w==="nfc");
      $("#panePass").classList.toggle("active", w==="pass");
    });
  });

  $("#reader").addEventListener("click", ()=> login("Manuel"));     // tocar el lector ingresa
  $("#btnLogin").addEventListener("click", ()=> login($("#user").value || "Manuel"));
  $("#btnLogout").addEventListener("click", logout);
  // atajo oculto de teclado para presentar
  document.addEventListener("keydown", (e)=>{
    if(e.key==="0" && $("#viewLogin").classList.contains("hidden")===false) login("Manuel");
  });

  renderList();

  // Debug en pantalla (solo dentro de la app, vía el puente nativo)
  if (window.DazzleBridge && DazzleBridge.getDebug) {
    try {
      const el = $("#dbg");
      el.textContent = "DEBUG · " + DazzleBridge.getDebug();
      el.style.display = "block";
    } catch (e) {}
  }
</script>
</body>
</html>
