services:
  kiosk:
    build: .
    container_name: nfc_kiosk
    restart: unless-stopped
    ports:
      - "8200:5000"
    # Config y secretos en .env (NO versionado). Ver .env.example.
    env_file:
      - .env
    volumes:
      - ./users.json:/app/users.json   # legado: solo para la migracion inicial a SQLite
      - ./data:/app/data               # kiosk.db (tarjetas, paneles, config) — v25
