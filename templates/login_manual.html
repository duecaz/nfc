<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Ingresar · La Nube</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #f0f2f4;
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 2.75rem 2.5rem 2.25rem;
      width: 90%; max-width: 400px;
      text-align: center;
      box-shadow: 0 1px 2px rgba(0,0,0,.05), 0 4px 20px rgba(0,0,0,.06);
    }

    .logo-mark {
      width: 44px; height: 44px;
      background: #0f172a;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: -.025em;
      color: #0f172a;
      margin-bottom: .25rem;
    }

    .sub {
      font-size: .875rem;
      color: #64748b;
      margin-bottom: 2rem;
    }

    .form-area { text-align: left; }

    label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: .35rem;
      margin-top: 1.1rem;
    }
    label:first-of-type { margin-top: 0; }

    .input-wrap { position: relative; }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: .7rem .9rem;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      color: #0f172a;
      font-size: .95rem;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input[type="password"] { padding-right: 3rem; }
    input:focus {
      border-color: #0f172a;
      box-shadow: 0 0 0 3px rgba(15,23,42,.07);
    }
    input::placeholder { color: #94a3b8; }

    .eye-btn {
      position: absolute; right: .75rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: #94a3b8; font-size: 1.1rem;
      padding: .2rem; line-height: 1;
      transition: color .15s;
    }
    .eye-btn:hover { color: #475569; }

    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: .7rem .9rem;
      font-size: .875rem;
      color: #dc2626;
      margin-bottom: 1rem;
      text-align: center;
    }

    .btn-submit {
      width: 100%; margin-top: 1.25rem; padding: .75rem;
      background: #0f172a; color: #fff;
      border: none; border-radius: 8px;
      font-size: .95rem; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .btn-submit:hover  { background: #1e293b; }
    .btn-submit:active { background: #070d18; }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

    hr {
      border: none;
      border-top: 1px solid #f1f5f9;
      margin: 1.75rem 0 1.5rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }
    .back-link {
      font-size: .875rem;
      color: #64748b;
      text-decoration: none;
      text-align: center;
      transition: color .15s;
    }
    .back-link:hover { color: #0f172a; }

    .ver {
      position: fixed; bottom: .5rem; right: .75rem;
      font-size: .6rem; color: #d1d5db; pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-mark">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
           stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9z"/>
      </svg>
    </div>
    <h1>La Nube</h1>
    <p class="sub">Ingresar con usuario y contraseña</p>

    <div class="form-area">
      {% if error %}
      <div class="error-box">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/auth-form" id="login-form">
        <label for="username">Usuario</label>
        <div class="input-wrap">
          <input id="username" name="username" type="text"
                 placeholder="Ej: jperez"
                 autocomplete="username" autocapitalize="none"
                 autocorrect="off" spellcheck="false"
                 value="{{ prefill or '' }}" required>
        </div>

        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <input id="password" name="password" type="password"
                 placeholder="Contraseña"
                 autocomplete="current-password" required>
          <button type="button" class="eye-btn" id="eye-btn" aria-label="Mostrar contraseña">
            &#x1F441;
          </button>
        </div>

        <button class="btn-submit" type="submit" id="submit-btn">
          Ingresar
        </button>
      </form>
    </div>

    <hr>

    <div class="links">
      <a class="back-link" href="/">&larr; Inicio de sesión con tarjeta</a>
      <a class="back-link" href="/cambiar-clave">Cambiar contraseña</a>
    </div>
  </div>
  <span class="ver">v{{ version }}</span>

  <script>
  const eyeBtn = document.getElementById('eye-btn');
  const passEl = document.getElementById('password');
  eyeBtn.addEventListener('click', () => {
    const show = passEl.type === 'password';
    passEl.type = show ? 'text' : 'password';
    eyeBtn.textContent = show ? '🙈' : '👁';
    passEl.focus();
  });

  document.getElementById('login-form').addEventListener('submit', () => {
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Ingresando…';
  });

  const u = document.getElementById('username');
  const p = document.getElementById('password');
  if (u.value) { p.focus(); } else { u.focus(); }
  </script>
</body>
</html>
