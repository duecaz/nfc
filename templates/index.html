<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>La Nube · Acceso docente</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #040f1e;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 55% at 25% 25%, rgba(19,78,111,.5) 0%, transparent 65%),
        radial-gradient(ellipse 55% 50% at 78% 75%, rgba(61,220,151,.07) 0%, transparent 60%);
      animation: glow 9s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { opacity: .7; }
      to   { opacity: 1;  }
    }

    .card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 28px;
      padding: 3.5rem 3rem 2.5rem;
      width: 90%; max-width: 480px;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.05),
        0 30px 70px rgba(0,0,0,.55),
        inset 0 1px 0 rgba(255,255,255,.09);
      backdrop-filter: blur(24px);
    }

    .logo {
      font-size: 60px;
      line-height: 1;
      display: block;
      margin-bottom: 1rem;
      filter: drop-shadow(0 0 20px rgba(61,220,151,.25));
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -.03em;
      margin-bottom: .3rem;
    }

    .sub {
      font-size: 1rem;
      color: rgba(255,255,255,.45);
      margin-bottom: 2.5rem;
      letter-spacing: .02em;
    }

    /* NFC animation */
    .nfc-wrap {
      position: relative;
      width: 160px; height: 160px;
      margin: 0 auto 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wave {
      position: absolute;
      border-radius: 50%;
      border: 1.5px solid rgba(61,220,151,.55);
      animation: wave 2.7s cubic-bezier(.4,0,.2,1) infinite;
    }
    .wave:nth-child(1) { animation-delay: 0s;   }
    .wave:nth-child(2) { animation-delay: .75s;  }
    .wave:nth-child(3) { animation-delay: 1.5s;  }

    @keyframes wave {
      0%   { width: 48px;  height: 48px;  opacity: .9; border-color: rgba(61,220,151,.7); }
      100% { width: 158px; height: 158px; opacity: 0;  border-color: rgba(61,220,151,0); }
    }

    .nfc-icon {
      position: relative; z-index: 1;
      font-size: 52px;
      filter: drop-shadow(0 4px 14px rgba(0,0,0,.5));
    }

    /* Status */
    .status {
      font-size: 1.15rem;
      font-weight: 500;
      min-height: 1.6rem;
      color: rgba(255,255,255,.75);
      transition: color .3s;
    }
    .status.ok  { color: #3ddc97; }
    .status.err { color: #ff6b6b; }

    .uid {
      margin-top: .4rem;
      font-family: monospace;
      font-size: .82rem;
      color: rgba(255,255,255,.3);
      min-height: 1.2rem;
    }

    /* Bottom buttons inside card */
    .actions {
      margin-top: 2.5rem;
      display: flex;
      gap: .9rem;
      justify-content: center;
    }
    .btn {
      padding: .78rem 1.55rem;
      border-radius: 50px;
      font-size: .95rem;
      font-weight: 600;
      text-decoration: none;
      transition: all .2s;
      display: inline-flex;
      align-items: center;
      gap: .35rem;
    }
    .btn-ghost {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.14);
      color: rgba(255,255,255,.8);
    }
    .btn-ghost:hover  { background: rgba(255,255,255,.13); color: #fff; }
    .btn-ghost:active { background: rgba(255,255,255,.18); }

    .btn-accent {
      background: rgba(61,220,151,.11);
      border: 1px solid rgba(61,220,151,.35);
      color: #3ddc97;
    }
    .btn-accent:hover  { background: rgba(61,220,151,.2); }
    .btn-accent:active { background: rgba(61,220,151,.28); }

    /* Tiny repair link */
    .repair-link {
      position: fixed; bottom: .5rem; left: .75rem;
      font-size: .65rem; opacity: .18;
      color: rgba(255,255,255,.6); text-decoration: none;
    }
    .repair-link:hover { opacity: .5; }

    .ver {
      position: fixed; bottom: .5rem; right: .75rem;
      font-size: .65rem; opacity: .18; pointer-events: none;
    }

    #catcher {
      position: fixed; top: -999px; left: -999px;
      width: 1px; height: 1px; opacity: 0;
    }
  </style>
</head>
<body>
  <input id="catcher" autocomplete="off" autofocus>

  <div class="card">
    <span class="logo">&#x2601;&#xFE0F;</span>
    <h1>La Nube</h1>
    <p class="sub">Acceso para docentes</p>

    <div class="nfc-wrap">
      <div class="wave"></div>
      <div class="wave"></div>
      <div class="wave"></div>
      <span class="nfc-icon">&#x1F4B3;</span>
    </div>

    <div class="status" id="status">Acercá tu tarjeta para ingresar</div>
    <div class="uid" id="uid"></div>

    <div class="actions">
      <a class="btn btn-ghost" href="/login-manual">Sin tarjeta &rarr;</a>
      <a class="btn btn-accent" href="/cambiar-clave">&#x1F511; Cambiar contraseña</a>
    </div>
  </div>

  <a class="repair-link" href="/reset">reparar</a>
  <span class="ver">v{{ version }}</span>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw-kiosk.js', { scope: '/' }).catch(() => {});
    }

    {% if auto_repair %}
    (async () => {
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
          await navigator.serviceWorker.register('/sw-kiosk.js', { scope: '/' });
        }
        if (window.caches) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }
        try { localStorage.clear(); sessionStorage.clear(); } catch (e) {}
        history.replaceState({}, '', '/');
      } catch (e) {}
    })();
    {% endif %}

    const catcher  = document.getElementById('catcher');
    const statusEl = document.getElementById('status');
    const uidEl    = document.getElementById('uid');

    function refocus() {
      if (document.activeElement !== catcher) catcher.focus();
    }
    setInterval(refocus, 400);
    document.addEventListener('click', e => {
      if (!e.target.closest('a, button')) refocus();
    });
    refocus();

    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      statusEl.className = 'status' + (cls ? ' ' + cls : '');
    }

    async function authenticate(uid) {
      setStatus('Verificando…');
      uidEl.textContent = '';
      try {
        const r    = await fetch('/auth', { method: 'POST', body: new URLSearchParams({ uid }) });
        const data = await r.json();
        if (data.ok) {
          setStatus('¡Bienvenido! Abriendo tus archivos…', 'ok');
          window.location.href = data.redirect;
        } else if (r.status === 404) {
          setStatus('Tarjeta no registrada', 'err');
          uidEl.textContent = 'UID: ' + (data.uid || uid);
          resetSoon();
        } else {
          setStatus(data.error || 'No se pudo ingresar', 'err');
          resetSoon();
        }
      } catch (e) {
        setStatus('Error de conexión', 'err');
        resetSoon();
      }
    }

    function resetSoon() {
      setTimeout(() => {
        setStatus('Acercá tu tarjeta para ingresar');
        uidEl.textContent = '';
      }, 4000);
    }

    catcher.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const uid = catcher.value.trim();
        catcher.value = '';
        if (uid.length >= 4) authenticate(uid);
      }
    });
  </script>
</body>
</html>
