<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>La Nube &middot; Acceso docente</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #f0f2f4;
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 2.25rem 2.5rem 2rem;
      width: 90%; max-width: 400px;
      text-align: center;
      box-shadow: 0 1px 2px rgba(0,0,0,.05), 0 4px 20px rgba(0,0,0,.06);
    }

    .logo-mark {
      width: 44px; height: 44px;
      background: #0f172a;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: -.025em;
      color: #0f172a;
      margin-bottom: .25rem;
    }

    .sub {
      font-size: .875rem;
      color: #64748b;
      margin-bottom: 1.75rem;
    }

    /* NFC zone */
    .nfc-wrap {
      position: relative;
      width: 110px; height: 110px;
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nfc-ring {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 1px solid #cbd5e1;
      animation: ringPulse 3s ease-in-out infinite;
    }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1);    opacity: 1;  }
      50%       { transform: scale(1.07); opacity: .4; }
    }

    .nfc-inner {
      position: relative; z-index: 1;
      width: 76px; height: 76px;
      border-radius: 50%;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Status */
    .status {
      font-size: .95rem;
      font-weight: 500;
      color: #475569;
      min-height: 1.4rem;
      transition: color .25s;
    }
    .status.ok  { color: #16a34a; }
    .status.err { color: #dc2626; }

    .uid {
      margin-top: .3rem;
      font-family: monospace;
      font-size: .78rem;
      color: #94a3b8;
      min-height: 1rem;
    }

    /* Duration selector */
    .duration-bar {
      margin-top: 1.1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .45rem;
    }
    .dur-label {
      font-size: .68rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .07em;
      font-weight: 600;
    }
    .dur-chips {
      display: flex;
      flex-wrap: wrap;
      gap: .35rem;
      justify-content: center;
    }
    .dur-chip {
      padding: .28rem .8rem;
      border-radius: 999px;
      border: 1.5px solid #e2e8f0;
      background: transparent;
      color: #64748b;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
      line-height: 1.4;
    }
    .dur-chip:hover { border-color: #94a3b8; color: #374151; }
    .dur-chip.active {
      background: #0f172a;
      border-color: #0f172a;
      color: #fff;
    }

    hr {
      border: none;
      border-top: 1px solid #f1f5f9;
      margin: 1.5rem 0 1.25rem;
    }

    /* Buttons */
    .actions { display: flex; gap: .6rem; }
    .btn {
      flex: 1;
      padding: .65rem 1rem;
      border-radius: 7px;
      font-size: .875rem;
      font-weight: 600;
      text-decoration: none;
      text-align: center;
      transition: all .15s;
      display: block;
      line-height: 1.4;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #cbd5e1;
      color: #374151;
    }
    .btn-outline:hover  { background: #f8fafc; border-color: #94a3b8; }
    .btn-outline:active { background: #f1f5f9; }
    .btn-solid {
      background: #0f172a;
      border: 1px solid #0f172a;
      color: #fff;
    }
    .btn-solid:hover  { background: #1e293b; }
    .btn-solid:active { background: #070d18; }

    .repair-link {
      position: fixed; bottom: .5rem; left: .75rem;
      font-size: .6rem; color: #d1d5db; text-decoration: none;
    }
    .repair-link:hover { color: #9ca3af; }
    .ver {
      position: fixed; bottom: .5rem; right: .75rem;
      font-size: .6rem; color: #d1d5db; pointer-events: none;
    }

    #catcher {
      position: fixed; top: -999px; left: -999px;
      width: 1px; height: 1px; opacity: 0;
    }
  </style>
</head>
<body>
  <input id="catcher" inputmode="none" autocomplete="off" autofocus>

  <div class="card">
    <div class="logo-mark">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
           stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9z"/>
      </svg>
    </div>
    <h1>La Nube</h1>
    <p class="sub">Acceso para docentes</p>

    <div class="nfc-wrap">
      <div class="nfc-ring"></div>
      <div class="nfc-inner">
        <svg width="38" height="28" viewBox="0 0 24 16" fill="none"
             stroke="#64748b" stroke-width="1.5"
             stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="1" width="22" height="14" rx="2"/>
          <line x1="1" x2="23" y1="6" y2="6"/>
        </svg>
      </div>
    </div>

    <div class="status" id="status">Acercá tu tarjeta para ingresar</div>
    <div class="uid" id="uid"></div>

    <div class="duration-bar">
      <span class="dur-label">Duración de sesión</span>
      <div class="dur-chips" id="dur-chips">
        <button class="dur-chip active" data-min="40">40 min</button>
        <button class="dur-chip" data-min="80">1h 20min</button>
        <button class="dur-chip" data-min="120">2h</button>
        <button class="dur-chip" data-min="160">2h 40min</button>
        <button class="dur-chip" data-min="200">3h 20min</button>
        <button class="dur-chip" data-min="240">4h</button>
      </div>
    </div>

    <hr>

    <div class="actions">
      <a class="btn btn-outline" href="/login-manual">Sin tarjeta &rarr;</a>
      <a class="btn btn-solid"   href="/cambiar-clave">Cambiar contraseña</a>
    </div>
  </div>

  <a class="repair-link" href="/reset">reparar</a>
  <span class="ver">v{{ version }}</span>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw-kiosk.js', { scope: '/' }).catch(() => {});
    }

    {% if auto_repair %}
    (async () => {
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
          await navigator.serviceWorker.register('/sw-kiosk.js', { scope: '/' });
        }
        if (window.caches) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }
        try { localStorage.clear(); sessionStorage.clear(); } catch (e) {}
        history.replaceState({}, '', '/');
      } catch (e) {}
    })();
    {% endif %}

    const catcher  = document.getElementById('catcher');
    const statusEl = document.getElementById('status');
    const uidEl    = document.getElementById('uid');

    function refocus() {
      if (document.activeElement !== catcher) catcher.focus();
    }
    setInterval(refocus, 100);
    document.addEventListener('click', e => {
      if (!e.target.closest('a, button')) refocus();
    });
    refocus();

    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      statusEl.className = 'status' + (cls ? ' ' + cls : '');
    }

    // Chip selection
    document.getElementById('dur-chips').addEventListener('click', function (e) {
      var chip = e.target.closest('.dur-chip');
      if (!chip) return;
      document.querySelectorAll('.dur-chip').forEach(function (c) {
        c.classList.remove('active');
      });
      chip.classList.add('active');
    });

    async function authenticate(uid) {
      setStatus('Verificando…');
      uidEl.textContent = '';
      try {
        const r    = await fetch('/auth', { method: 'POST', body: new URLSearchParams({ uid }) });
        const data = await r.json();
        if (data.ok) {
          var activeChip = document.querySelector('.dur-chip.active');
          var minutes    = activeChip ? parseInt(activeChip.dataset.min, 10) : 40;
          var expiresAt  = Date.now() + minutes * 60 * 1000;

          setStatus('Bienvenido' + (data.user ? ', ' + data.user : '') + '. Abriendo archivos…', 'ok');

          if (navigator.serviceWorker && navigator.serviceWorker.controller) {
            navigator.serviceWorker.controller.postMessage({ type: 'KIOSK_SESSION', expiresAt: expiresAt });
          }
          setTimeout(function () { window.location.href = '/logout'; }, minutes * 60 * 1000);

          window.location.href = data.redirect;
        } else if (r.status === 404) {
          setStatus('Tarjeta no registrada', 'err');
          uidEl.textContent = 'UID: ' + (data.uid || uid);
          resetSoon();
        } else {
          setStatus(data.error || 'No se pudo ingresar', 'err');
          resetSoon();
        }
      } catch (e) {
        setStatus('Error de conexión', 'err');
        resetSoon();
      }
    }

    function resetSoon() {
      setTimeout(() => {
        setStatus('Acercá tu tarjeta para ingresar');
        uidEl.textContent = '';
        catcher.value = '';
        catcher.focus();
      }, 4000);
    }

    function normalizeUid(raw) {
      if (!/Android/.test(navigator.userAgent)) return raw;
      const bytes = raw.match(/.{2}/g);
      if (!bytes || bytes.length < 4) return raw;
      bytes.reverse();
      return bytes.map(b => {
        const hi = parseInt(b[0], 16);
        const lo = parseInt(b[1], 16);
        return ((lo << 4) | hi).toString(16).padStart(2, '0').toUpperCase();
      }).join('');
    }

    catcher.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const uid = normalizeUid(catcher.value.trim());
        catcher.value = '';
        if (uid.length >= 4) authenticate(uid);
      }
    });

    // Captura global de teclas HID (fase captura)
    document.addEventListener('keydown', function (e) {
      var active     = document.activeElement;
      var isCatcher  = (active === catcher);
      var tag        = active ? active.tagName : 'NONE';
      var isRealInput = !isCatcher &&
        (tag === 'INPUT' || tag === 'TEXTAREA' ||
         (active && active.isContentEditable));

      if (isCatcher)   return;
      if (isRealInput) return;

      if (e.key === 'Enter') {
        var uid = normalizeUid(catcher.value.trim());
        catcher.value = '';
        if (uid.length >= 4) authenticate(uid);
        e.preventDefault();
      } else if (e.key.length === 1) {
        catcher.value += e.key;
        e.preventDefault();
      } else if (e.key === 'Backspace') {
        catcher.value = catcher.value.slice(0, -1);
        e.preventDefault();
      }
    }, true);

    // Web NFC (Chrome Android 89+)
    if ('NDEFReader' in window) {
      const nfcWrap = document.createElement('div');
      nfcWrap.style.cssText = 'margin-top:.65rem';
      const nfcBtn = document.createElement('button');
      nfcBtn.className = 'btn btn-outline';
      nfcBtn.style.cssText = 'width:100%;font-size:.82rem;padding:.55rem 1rem';
      nfcBtn.textContent = '📦 Activar NFC (Android)';
      nfcWrap.appendChild(nfcBtn);
      document.querySelector('.actions').after(nfcWrap);

      let nfcActive = false;
      async function startWebNFC() {
        try {
          const ndef = new NDEFReader();
          await ndef.scan();
          nfcActive = true;
          nfcBtn.textContent = '📦 NFC activo — acercá la tarjeta';
          nfcBtn.style.color = '#16a34a';
          nfcBtn.style.borderColor = '#16a34a';
          ndef.addEventListener('reading', ({ serialNumber }) => {
            const uid = serialNumber.split(':').join('').toUpperCase();
            if (uid.length >= 4) authenticate(uid);
          });
          ndef.addEventListener('error', () => {
            if (!nfcActive) return;
            nfcBtn.textContent = '📱 Activar NFC (Android)';
            nfcBtn.style.color = '';
            nfcBtn.style.borderColor = '';
            nfcActive = false;
          });
        } catch {
          nfcBtn.textContent = '📱 Activar NFC (Android)';
        }
      }
      nfcBtn.addEventListener('click', startWebNFC);
      startWebNFC();
    }
  </script>
</body>
</html>
