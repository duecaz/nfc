<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Admin · La Nube</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #0a1628;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .box {
      background: #0f2442;
      border: 1px solid #1e3a5f;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .logo { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: .3rem; }
    p.sub { color: #64748b; font-size: .95rem; margin-bottom: 2rem; }
    input[type="password"] {
      width: 100%; padding: .85rem 1rem;
      background: #0a1e38; border: 1px solid #2d5080;
      border-radius: 12px; color: #e2e8f0; font-size: 1.05rem;
      outline: none; margin-bottom: 1rem;
      transition: border-color .15s;
    }
    input[type="password"]:focus { border-color: #38bdf8; }
    button {
      width: 100%; padding: .9rem;
      background: #38bdf8; color: #04121f;
      border: none; border-radius: 12px;
      font-size: 1.05rem; font-weight: 700;
      cursor: pointer; transition: filter .15s;
    }
    button:hover { filter: brightness(1.1); }
    .error {
      background: #450a0a; color: #fca5a5;
      border-radius: 10px; padding: .7rem 1rem;
      font-size: .95rem; margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">&#x2699;&#xFE0F;</div>
    <h1>Admin La Nube</h1>
    <p class="sub">Panel de gestión de tarjetas NFC</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <input type="password" name="password"
             placeholder="Contraseña de administrador"
             autofocus autocomplete="current-password">
      <button type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
